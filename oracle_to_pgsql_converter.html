<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle to PG Converter Pro v1.2.1</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-deep: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #38bdf8;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 12px 24px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            flex: 1;
            gap: 1px;
            background: var(--border);
        }

        .panel {
            background: var(--bg-deep);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .panel-header {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-family: 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            padding: 16px;
            resize: none;
            outline: none;
            line-height: 1.6;
        }

        .btn {
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border-color: var(--border);
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
        }

        .notif {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 24px;
            background: var(--success);
            color: white;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transform: translateY(100px);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .notif.show {
            transform: translateY(0);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">ORACLE ➜ POSTGRESQL (v1.2.1)</div>
        <div style="display: flex; align-items: center; gap: 16px;">
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-ghost" onclick="clearAll()">Clear All</button>
                <button class="btn btn-primary" onclick="copyResult()">Copy Result (Slot 4)</button>
            </div>
        </div>
    </header>

    <div class="main-layout">
        <!-- Slot 1 -->
        <div class="panel">
            <div class="panel-header">
                <span>1. Java Source (Cache)</span>
                <span id="cacheStatus" style="color: var(--success); text-transform: none;">Waiting for input...</span>
            </div>
            <textarea id="javaIn" placeholder="Paste Java code with SQL here..."></textarea>
        </div>

        <!-- Slot 2 -->
        <div class="panel">
            <div class="panel-header">
                <span>2. Clean Oracle SQL (Pure Syntax)</span>
                <button class="btn btn-ghost" onclick="copy('oracleOut')">Copy</button>
            </div>
            <textarea id="oracleOut" placeholder="Clean SQL without comments or Java boilerplate..."></textarea>
        </div>

        <!-- Slot 3 -->
        <div class="panel">
            <div class="panel-header">
                <span>3. PostgreSQL (Converted)</span>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-primary" onclick="convert()">Transform Now</button>
                    <button class="btn btn-ghost" onclick="copy('pgOut')">Copy</button>
                </div>
            </div>
            <textarea id="pgOut" placeholder="Converted PostgreSQL SQL..."></textarea>
        </div>

        <!-- Slot 4 -->
        <div class="panel">
            <div class="panel-header">
                <span>4. Java 21 Text Block (Final Result)</span>
                <button class="btn btn-ghost" onclick="copy('finalRes')">Copy</button>
            </div>
            <textarea id="finalRes" readonly placeholder="Result code with original lines as -- comments..."></textarea>
        </div>
    </div>

    <div id="notif" class="notif">Copied to clipboard!</div>

    <script src="oracle_to_pgsql.js"></script>
    <script>
        const $ = id => document.getElementById(id);
        let javaSourceCache = "";

        // Slot 1 -> Slot 2 (Auto Extraction)
        $('javaIn').addEventListener('input', () => {
            const val = $('javaIn').value;
            javaSourceCache = val; // Store in cache

            if (!val) {
                $('oracleOut').value = '';
                $('cacheStatus').innerText = 'Waiting for input...';
                return;
            }

            $('cacheStatus').innerText = 'Cached (' + val.split('\n').length + ' lines)';
            $('oracleOut').value = OracleToPG.extract(val);
        });

        function convert() {
            const cleanOracle = $('oracleOut').value;
            if (!cleanOracle) {
                alert("Extraction failed or empty SQL in Slot 2.");
                return;
            }

            // Slot 2 -> Slot 3 (Transformation)
            const pgSql = OracleToPG.format(OracleToPG.transform(cleanOracle));
            $('pgOut').value = pgSql;

            // Slot 1 + Slot 3 -> Slot 4 (Restoration)
            if (javaSourceCache) {
                $('finalRes').value = OracleToPG.restoreAsTextBlock(javaSourceCache, pgSql);
            }
        }

        function copy(id) {
            const el = $(id);
            el.select();
            document.execCommand('copy');
            showNotif();
        }

        function copyResult() { copy('finalRes'); }

        function clearAll() {
            $('javaIn').value = '';
            $('oracleOut').value = '';
            $('pgOut').value = '';
            $('finalRes').value = '';
            javaSourceCache = "";
            $('cacheStatus').innerText = 'Waiting for input...';
        }

        function showNotif() {
            const n = $('notif');
            n.classList.add('show');
            setTimeout(() => n.classList.remove('show'), 2000);
        }
    </script>
</body>

</html>
